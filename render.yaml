services:
  # SERVICIO 1: BACKEND API
  - type: web
    name: mi-api-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mi-api-db
          property: connectionString
  
  # SERVICIO 2: FRONTEND (sin region)
  - type: web
    name: mi-api-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN

databases:
  - name: mi-api-db
    databaseName: apidb
    user: admin
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all IP addresses