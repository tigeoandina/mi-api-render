name: pmac_emac_flutter
description: PMAC/EMAC - TGP Sistema de Gestión de Información Ambiental
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0                    # Para consumir API
  shared_preferences: ^2.2.0      # Para guardar token (como AsyncStorage)
  provider: ^6.0.0                # Para estado global

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true